[build]
  base = "apps/web"
  command = "npm install --prefix ../.. && npm run build"
  publish = "apps/web/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # Set this in the Netlify UI (Site settings -> Environment variables) to
  # your deployed Render URL, e.g. https://chrono-bid-server.onrender.com
  # NEXT_PUBLIC_SERVER_URL = "https://chrono-bid-server.onrender.com"
